[package]
name = "codemem-daemon"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "codemem sidecar daemon for semantic drift detection"

[[bin]]
name = "codemem-daemon"
path = "src/main.rs"

[dependencies]
anyhow = "1"
blake3 = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
globset = "0.4"
json_comments = "0.2"
libc = "0.2"
parking_lot = "0.12"
regex = "1"
rusqlite = { version = "0.32", features = ["bundled", "chrono"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7", features = ["codec"] }
walkdir = "2"
oxc_allocator = "0.123"
oxc_parser = "0.123"
oxc_span = "0.123"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
